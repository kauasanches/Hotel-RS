<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hotel RS — Cadastro de Hóspedes</title>
    <link rel="stylesheet" href="/static/css/style.css" />
</head>

<body>
    <!-- NAVBAR -->
    <nav role="navigation" aria-label="Navegação principal">
        <div>
            <a href="/" class="nav-brand">
                <span class="nav-brand-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M2 22h20V2L2 22zm18-2H6.5L20 6.5V20z" />
                        <path d="M4 22l2-2h14l2 2H4z" opacity="0.5" />
                    </svg>
                </span>
                Hotel RS
            </a>

            <button class="nav-toggle" id="navToggle" aria-label="Abrir menu">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 12h18M3 6h18M3 18h18" />
                </svg>
            </button>

            <ul class="nav-links" id="navLinks">
                <li>
                    <a href="/" class="active">
                        <svg viewBox="0 0 24 24">
                            <path d="M5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82zM12 3L1 9l11 6 9-4.91V17h2V9L12 3z" />
                        </svg>
                        Cadastro
                    </a>
                </li>
                <li>
                    <a href="/consulta">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
                        </svg>
                        Consultar
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- CAROUSEL -->
    <header class="carousel" role="banner" aria-label="Banners do Hotel RS">
        <div class="carousel-inner" id="carouselInner">
            <div class="carousel-item active">
                <img src="assets/images/banner1.png" alt="Fachada do Hotel RS - Vista panorâmica" />
            </div>
            <div class="carousel-item">
                <img src="assets/images/banner2.png" alt="Piscina e área de lazer do Hotel RS" />
            </div>
            <div class="carousel-item">
                <img src="assets/images/banner3.png" alt="Restaurante e salão de eventos do Hotel RS" />
            </div>
        </div>
    </header>

    <!-- FORMULÁRIO DE CADASTRO -->
    <main class="container">
        <section class="form-section">
            <h2>Cadastro de Hóspedes</h2>

            <form id="formCadastro" novalidate>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="nome">Nome completo</label>
                        <input type="text" id="nome" name="nome" required placeholder="Seu nome" autocomplete="name" />
                        <span class="error-message" id="error-nome">Informe o nome do hóspede.</span>
                    </div>

                    <div class="form-group">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" name="cpf" required placeholder="000.000.000-00" />
                        <span class="error-message" id="error-cpf">Informe o CPF.</span>
                    </div>

                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" required placeholder="email@exemplo.com"
                            autocomplete="email" />
                        <span class="error-message" id="error-email">Informe um e-mail válido.</span>
                    </div>

                    <div class="form-group">
                        <label for="telefone">Telefone</label>
                        <input type="tel" id="telefone" name="telefone" required placeholder="(51) 99999-9999"
                            autocomplete="tel" />
                        <span class="error-message" id="error-telefone">Informe o telefone.</span>
                    </div>

                    <div class="form-group full-width">
                        <label for="endereco">Endereço</label>
                        <input type="text" id="endereco" name="endereco" required
                            placeholder="Rua, número, bairro, cidade" autocomplete="street-address" />
                        <span class="error-message" id="error-endereco">Informe o endereço.</span>
                    </div>

                    <div class="form-group full-width">
                        <label for="observacao">Observações
                            <span style="color: var(--color-text-muted); font-weight: 400">(opcional)</span></label>
                        <textarea id="observacao" name="observacao"
                            placeholder="Preferências, restrições, informações adicionais..."></textarea>
                    </div>

                    <button type="submit" class="btn-submit" id="btnCadastrar">
                        <span class="btn-spinner"></span>
                        <span class="btn-text">
                            <svg viewBox="0 0 24 24">
                                <path
                                    d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z" />
                            </svg>
                            Cadastrar Hóspede
                        </span>
                    </button>

                    <div id="mensagem" role="alert"></div>
                </div>
            </form>
        </section>
    </main>

    <script src="assets/js/main.js"></script>
</body>

</html>
