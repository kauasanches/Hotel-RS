<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/css/style.css">
    <!-- <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=1"> -->
    <title>Bem vindo(a) - Hotel RS</title>
</head>
<body>
    <div class="container">
        <nav>
            <div class="cabecalho">
                <!-- <a href="/" class="titulo_nav">
                    <img src="./assets/img/logo-redonda-removedbg.png" alt="Logo" class="logoImg">
                </a> -->
                <div class="titulo_nav_img">
                    <a href="/"><img src="./assets/img/logo.png" alt="Logo" class="logoImg"></a>
                </div>
                <!-- <button type="button">
                    <span></span>
                </button> -->
                <div id="navbarNav">
                    <ul>
                        <li>
                            <a href="/">🏠 Cadastro</a>
                        </li>
                        <li>
                            <a href="/consulta">🔍 Consultar</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        
        <div class="formulario">
            <form id="formCadastro">
                <h1>Agende já seu horário!</h1>
                <table class="container-form">
                    <td>
                        <div>
                            <div>
                                <label>Nome:</label>
                                <input type="text" name="nome">
                            </div>
                        </div>
                        <div>
                            <div>
                                <label>Email:</label>
                                <input type="email" name="email">
                            </div>
                        </div>
                    </td>
                    <td>
                        <div>
                            <div>
                                <label>CPF:</label>
                                <input type="text" name="cpf" maxlength="11">
                            </div>
                        </div>
                        <div>
                            <div>
                                <label>Endereço:</label>
                                <input type="text" name="endereco">
                            </div>
                        </div>
                    </td>
                    <td>
                        <div>
                            <div>
                                <label>Telefone:</label>
                                <input type="text" name="telefone">
                            </div>
                        </div>
                        <div>
                            <div>
                                <label>OBS:</label>
                                <textarea name="obs"></textarea>
                            </div>
                        </div>
                    </td>
                </table>
                <div class="container-submit">
                    <input type="submit" class="btn-enviar" value="Cadastrar-se">
                </div>
                <div>
                    <p id="mensagem"></p>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <p>Todos os direitos reservados. Desenvolvido por <a href="https://github.com/kauasanches" target="_blank">Kauã Sanches</a></p>
    </footer>

    <script src="./assets/js/main.js"></script>
</body>
</html>
