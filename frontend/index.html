<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/css/style.css">
    <title>Bem vindo(a) - Hotel RS</title>
</head>
<body>
    <div class="container">
        <nav>
            <div class="cabecalho">
                <a href="/" class="titulo_nav">🏨 Hotel RS</a>
                <!-- <button type="button">
                    <span></span>
                </button> -->
                <div id="navbarNav">
                    <ul>
                        <li>
                            <a href="/">🏠 Cadastro</a>
                        </li>
                        <li>
                            <a href="/consulta">🔍 Consultar</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        
        <div class="formulario">
            <form id="formCadastro">
                <h1>Agende já seu horário!</h1>
                
                <div class="grid-container">
                    <div class="input-group">
                        <label>Nome:</label>
                        <input type="text" name="nome">
                    </div>
            
                    <div class="input-group">
                        <label>CPF:</label>
                        <input type="text" name="cpf" maxlength="11">
                    </div>
            
                    <div class="input-group">
                        <label>Telefone:</label>
                        <input type="text" name="telefone">
                    </div>
            
                    <div class="input-group">
                        <label>Email:</label>
                        <input type="email" name="email">
                    </div>
            
                    <div class="input-group">
                        <label>Endereço:</label>
                        <input type="text" name="endereco">
                    </div>
            
                    <div class="input-group">
                        <label>OBS:</label>
                        <textarea name="obs"></textarea>
                    </div>
                </div>
            
                <div class="container-submit">
                    <input type="submit" class="btn-enviar" value="Cadastrar-se">
                </div>
            </form>
        </div>
    </div>

    <footer>
        <p>Todos os direitos reservados. Desenvolvido por <a href="https://github.com/kauasanches" target="_blank">Kauã Sanches</a></p>
    </footer>

    <script src="./assets/js/main.js"></script>
</body>
</html>
