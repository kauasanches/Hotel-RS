<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <!-- 💡 Define o padrão de caracteres (permite acentos) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Clientes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="../static/css/style.css" />
</head>

<body>
    <nav>
        <div>
            <!-- 🏨 Logotipo / Nome do Hotel -->
            <a href="/">🏨 Hotel RS</a>
            <!-- 📱 Botão que aparece em telas pequenas (menu colapsável) -->
            <button type="button">
                <span></span>
            </button>
            <!-- 🧭 Itens de navegação -->
            <div id="navbarNav">
                <ul>
                    <li>
                        <!-- Página atual: Cadastro -->
                        <a href="/">🏠 Cadastro</a>
                    </li>
                    <li>
                        <!-- Link para a página de consulta -->
                        <a href="/consulta">🔍 Consultar</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <header>
        <div id="carouselExampleIndicators" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
                <!-- Primeira imagem (ativa por padrão) -->
                <div class="carousel-item active">
                    <img src="assets/images/banner1.png" class="d-block w-100" alt="Banner 1">
                </div>
                <div class="carousel-item">
                    <img src="assets/images/banner2.png" class="d-block w-100" alt="Banner 2">
                </div>
                <div class="carousel-item">
                    <img src="assets/images/banner3.png" class="d-block w-100" alt="Banner 3">
                </div>
            </div>
        </div>
    </header>

    <form id="formCadastro">
        <div>
            <div>
                <label> Nome:</label>
                <input type="text" name="nome" required />
            </div>
        </div>
        <div>
            <div>
                <label> CPF:</label>
                <input type="text" name="cpf" required />
            </div>
        </div>

        <div>
            <div>
                <label> Email:</label>
                <input type="email" name="email" required />
            </div>
        </div>
        <div>
            <div>
                <label> Telefone:</label>
                <input type="text" name="telefone" required />
            </div>
        </div>

        <div>
            <div>
                <label> Endereço:</label>
                <input type="text" name="endereco" required />
            </div>
        </div>

        <div>
            <div>
                <label> Observação:</label>
                <textarea type="text" name="observacao" required> </textarea>
            </div>
        </div>
        <button type="submit">Cadastrar</button>

        <!-- Mensagem de confirmação (sucesso ou erro) -->
        <div id="mensagem"></div>
    </form>

    <!-- =============================================================================
    ⚙️ SCRIPTS JAVASCRIPT
    ----------------------------------------------------------------------------------
        ✨ O primeiro import o bootstrap.js (responsável pela estilização do site)
        💡 O segundo importa o main.js (responsável pela comunicação com Flask e o efeito de neve).
    ================================================================================== -->

    <!-- JS DO BOOTSTRAP (para o carrossel e o menu colapsável) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>

    <!-- JS DO PROJETO (interação com Flask e efeito de neve) -->
    <script src="assets/js/main.js"></script>
</body>

</html>
