<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hotel RS — Alterar Dados</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav role="navigation" aria-label="Navegação principal">
    <div>
      <a href="/" class="nav-brand">
        <span class="nav-brand-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 22h20V2L2 22zm18-2H6.5L20 6.5V20z"/>
            <path d="M4 22l2-2h14l2 2H4z" opacity="0.5"/>
          </svg>
        </span>
        Hotel RS
      </a>

      <button class="nav-toggle" id="navToggle" aria-label="Abrir menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12h18M3 6h18M3 18h18"/>
        </svg>
      </button>

      <ul class="nav-links" id="navLinks">
        <li><a href="/">
          <svg viewBox="0 0 24 24"><path d="M5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82zM12 3L1 9l11 6 9-4.91V17h2V9L12 3z"/></svg>
          Cadastro
        </a></li>
        <li><a href="/consulta">
          <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          Consultar
        </a></li>
      </ul>
    </div>
  </nav>

  <!-- PAGE HEADER -->
  <header class="page-header">
    <h1>Alterar Dados do Hóspede</h1>
    <p>Edite as informações e salve as alterações.</p>
  </header>

  <!-- EDIT FORM -->
  <main class="container">
    <section class="form-section edit-section">
      <h2>Editar Cadastro</h2>

      <form id="formAlterar" novalidate>
        <input type="hidden" id="clienteId" name="id" />

        <div class="form-grid">

          <div class="form-group">
            <label for="nome">Nome completo</label>
            <input type="text" id="nome" name="nome" required />
          </div>

          <div class="form-group">
            <label for="cpf">CPF</label>
            <input type="text" id="cpf" name="cpf" required />
          </div>

          <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" required />
          </div>

          <div class="form-group">
            <label for="telefone">Telefone</label>
            <input type="tel" id="telefone" name="telefone" required />
          </div>

          <div class="form-group full-width">
            <label for="endereco">Endereço</label>
            <input type="text" id="endereco" name="endereco" required />
          </div>

          <div class="form-group full-width">
            <label for="observacoes">Observações <span style="color:var(--color-text-muted);font-weight:400;">(opcional)</span></label>
            <textarea id="observacoes" name="observacoes"></textarea>
          </div>

          <button type="submit" class="btn-submit" id="btnSalvar">
            <span class="btn-spinner"></span>
            <span class="btn-text">
              <svg viewBox="0 0 24 24"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>
              Salvar Alterações
            </span>
          </button>

          <div id="mensagem" role="alert"></div>

        </div>
      </form>
    </section>
  </main>

  <script src="assets/js/main.js"></script>
</body>
</html>
